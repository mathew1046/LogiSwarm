services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: logiswarm-postgres
    environment:
      POSTGRES_USER: logiswarm
      POSTGRES_PASSWORD: logiswarm
      POSTGRES_DB: logiswarm
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logiswarm -d logiswarm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - logiswarm-network

  redis:
    image: redis:7-alpine
    container_name: logiswarm-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - logiswarm-network

  backend:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    container_name: logiswarm-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://logiswarm:logiswarm@postgres:5432/logiswarm
      - REDIS_URL=redis://redis:6379
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - LLM_FALLBACK_MODEL=${LLM_FALLBACK_MODEL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ALLOW_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
    command: >
      sh -c "uv sync && uv run uvicorn app.main:app --host 0.0.0.0 --port 5001 --reload"
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logiswarm-network

  frontend:
    image: node:20-alpine
    container_name: logiswarm-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://backend:5001
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - logiswarm-network

volumes:
  postgres_data:
  redis_data:

networks:
  logiswarm-network:
    driver: bridge