services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: logiswarm-postgres
    environment:
      POSTGRES_USER: logiswarm
      POSTGRES_PASSWORD: logiswarm
      POSTGRES_DB: logiswarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logiswarm -d logiswarm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: logiswarm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    container_name: logiswarm-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "uv sync && uv run python -m http.server 5001"
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: logiswarm-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
